<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct HTTP access to config/ directory
    # Belt-and-suspenders on top of config/.htaccess
    <Directory /var/www/html/config>
        Require all denied
    </Directory>

    # Security headers (mirror PHP security.php headers at Apache level)
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "SAMEORIGIN"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"

    # Trust Render's proxy for HTTPS detection
    # (PHP reads HTTP_X_FORWARDED_PROTO to set cookie_secure)
    RemoteIPHeader X-Forwarded-For

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
