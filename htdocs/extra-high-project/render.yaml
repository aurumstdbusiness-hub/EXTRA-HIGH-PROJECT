# =============================================================================
#  E-coomy — render.yaml  (Infrastructure as Code)
#
#  Deploy via Render Blueprint:
#    Dashboard → New → Blueprint → connect your GitHub repo → Deploy
#
#  Or deploy manually:
#    Dashboard → New → Web Service → Docker → connect repo → set env vars
# =============================================================================

services:
  - type: web
    name: e-coomy
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile

    # Render health check — must return HTTP 200
    healthCheckPath: /

    # Environment variables
    # Set DB_HOST / DB_USER / DB_PASS in the Render dashboard.
    # Get these from your external MySQL provider (Railway, Aiven, etc.)
    envVars:
      # Option A — Railway-style single URL (MYSQL_URL)
      # Paste the full mysql://user:pass@host:port/dbname string here
      - key: MYSQL_URL
        sync: false          # fill in Render dashboard
      # Option B — individual variables (if not using MYSQL_URL)
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        value: Base_Client
